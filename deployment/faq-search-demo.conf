# HTTP → HTTPS
server {
    listen 80;
    server_name vibebycory.dev;
    location / { return 301 https://$host$request_uri; }
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name vibebycory.dev;
    
    # Certbot will manage these paths
    ssl_certificate     /etc/letsencrypt/live/vibebycory.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibebycory.dev/privkey.pem;
    
    # WebSocket upgrade map (in case not present globally)
    map $http_upgrade $connection_upgrade {
        default close;
        "Upgrade" upgrade;
        "" close;
    }
    
    # Proxy the demo under /faq-search-demo/
    location /faq-search-demo/ {
        proxy_pass http://localhost:8501/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Prefix /faq-search-demo;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_redirect off;
    }
    
    location = /healthz { 
        return 200 "ok\n"; 
        add_header Content-Type text/plain; 
    }
}